<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Verification Example</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Payment Verification Status</h2>
    <p>Simulate checking the backend for recent verified payments.</p>
    
    <button onclick="checkPayments()">Check Recent Payments</button>
    <div id="result">Waiting...</div>

    <script>
        const API_BASE = 'http://localhost:3000';
        const API_KEY = 'your_super_secret_api_key_here'; // NEVER expose real keys in frontend in production!

        async function checkPayments() {
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Checking...";
            
            try {
                const response = await fetch(`${API_BASE}/api/verify/payments`, {
                    method: 'GET',
                    headers: {
                        'x-api-key': API_KEY
                    }
                });

                const data = await response.json();
                resDiv.innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                resDiv.innerText = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
